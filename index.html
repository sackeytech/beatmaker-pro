<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Piano Drum Machine</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="drum-machine">
      <h2 class="machine-title">BEATMAKER PRO</h2>
      
      <p id="display">READY</p>

      <div id="pad-bank">
        <button id="Chord1" class="drum-pad">Q
          <audio class="clip" src="https://s3.amazonaws.com/freecodecamp/drums/Chord_1.mp3" id="Q"></audio>
        </button>
        <button id="Chord2" class="drum-pad">W
          <audio class="clip" id="W" src="https://s3.amazonaws.com/freecodecamp/drums/Chord_2.mp3"></audio>
        </button>
        <button id="Chord3" class="drum-pad">E
          <audio class="clip" src="https://s3.amazonaws.com/freecodecamp/drums/Chord_3.mp3" id="E"></audio>
        </button>
        <button id="Shaker" class="drum-pad">A
          <audio class="clip" src="https://s3.amazonaws.com/freecodecamp/drums/Give_us_a_light.mp3" id="A"></audio>
        </button>
        <button class="drum-pad" id="Open-HH">S
          <audio class="clip" id="S" src="https://s3.amazonaws.com/freecodecamp/drums/Dry_Ohh.mp3"></audio>
        </button>
        <button id="Closed-HH" class="drum-pad">D
          <audio class="clip" id="D" src="https://s3.amazonaws.com/freecodecamp/drums/Bld_H1.mp3"></audio>
        </button>
        <button id="Punchy-Kick" class="drum-pad">Z
          <audio class="clip" id="Z" src="https://s3.amazonaws.com/freecodecamp/drums/punchy_kick_1.mp3"></audio>
        </button>
        <button id="Side-Stick" class="drum-pad">X
          <audio class="clip" id="X" src="https://s3.amazonaws.com/freecodecamp/drums/side_stick_1.mp3"></audio>
        </button>
        <button class="drum-pad" id="Snare">C
          <audio class="clip" id="C" src="https://s3.amazonaws.com/freecodecamp/drums/Brk_Snr.mp3"></audio>
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
